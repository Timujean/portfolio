<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --glass-bg: rgba(255,255,255,0.03);
    --glass-border: rgba(255,255,255,0.08);
    --glass-highlight: rgba(255,255,255,0.18);
    --accent: #667eea;
    --accent2: #a5b4fc;
    --text-main: rgba(255,255,255,0.92);
    --text-muted: rgba(255,255,255,0.5);
    --text-dim: rgba(255,255,255,0.3);
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #050508;
    font-family: 'Outfit', sans-serif;
    color: var(--text-main);
  }

  /* ── Background canvas ── */
  #bg-canvas {
    position: fixed;
    inset: 0;
    width: 100%; height: 100%;
    cursor: crosshair;
    z-index: 0;
  }

  /* ── Layout ── */
  #layout {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    padding: 32px;
    z-index: 10;
    pointer-events: none;
  }

  /* ── Glass panel base ── */
  .panel {
    backdrop-filter: blur(28px) saturate(130%);
    -webkit-backdrop-filter: blur(28px) saturate(130%);
    background: linear-gradient(145deg, rgba(255,255,255,0.055) 0%, rgba(255,255,255,0.01) 100%);
    border: 1px solid var(--glass-border);
    border-top-color: var(--glass-highlight);
    border-left-color: var(--glass-highlight);
    box-shadow: 0 24px 48px rgba(0,0,0,0.5), inset 0 0 24px rgba(255,255,255,0.02);
    border-radius: 24px;
    pointer-events: all;
    transition: box-shadow 0.4s ease;
  }

  /* ── Left card ── */
  #card {
    width: 280px;
    flex-shrink: 0;
    padding: 32px 28px;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  /* Avatar */
  .avatar-wrap {
    width: 72px; height: 72px;
    border-radius: 50%;
    overflow: hidden;
    border: 1.5px solid rgba(255,255,255,0.15);
    box-shadow: 0 0 0 4px rgba(102,126,234,0.15);
    margin-bottom: 20px;
    flex-shrink: 0;
    background: rgba(255,255,255,0.04);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    position: relative;
  }
  .avatar-wrap img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }
  .avatar-placeholder {
    font-size: 28px;
    color: var(--text-dim);
    position: absolute;
  }
  .avatar-input { display: none; }
  .avatar-overlay {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.5);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.2s;
    border-radius: 50%;
    font-size: 10px; letter-spacing: 0.5px;
    color: #fff; text-transform: uppercase; font-weight: 500;
  }
  .avatar-wrap:hover .avatar-overlay { opacity: 1; }

  /* Name & title */
  .name {
    font-size: 22px;
    font-weight: 500;
    letter-spacing: -0.03em;
    background: linear-gradient(135deg, #fff 30%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 4px;
    cursor: pointer;
    border-bottom: 1px solid transparent;
    transition: border-color 0.2s;
    outline: none;
  }
  .name:focus { border-bottom-color: var(--accent); }
  [contenteditable]:empty::before {
    content: attr(data-placeholder);
    color: var(--text-dim);
    -webkit-text-fill-color: var(--text-dim);
  }

  .role {
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 300;
    letter-spacing: 0.01em;
    margin-bottom: 20px;
    cursor: pointer;
    outline: none;
    border-bottom: 1px solid transparent;
    transition: border-color 0.2s;
  }
  .role:focus { border-bottom-color: rgba(255,255,255,0.2); }

  /* Divider */
  .divider {
    width: 100%;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--glass-highlight), transparent);
    margin: 16px 0;
  }

  /* Status */
  .status-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
    box-shadow: 0 0 8px currentColor;
  }
  .status-dot.available { background: #4ade80; color: #4ade80; }
  .status-dot.busy      { background: #fb923c; color: #fb923c; }
  .status-dot.away      { background: #94a3b8; color: #94a3b8; }

  .status-text {
    font-size: 12px;
    font-weight: 400;
    color: var(--text-muted);
    letter-spacing: 0.02em;
  }
  .status-select {
    background: transparent;
    border: none;
    color: var(--text-muted);
    font-family: 'Outfit', sans-serif;
    font-size: 12px;
    font-weight: 400;
    cursor: pointer;
    outline: none;
    padding: 0;
    letter-spacing: 0.02em;
  }
  .status-select option { background: #0d0d14; color: #fff; }

  /* Email */
  .email-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .email-icon { opacity: 0.4; flex-shrink: 0; }
  .email-link {
    font-size: 12px;
    color: var(--text-muted);
    text-decoration: none;
    letter-spacing: 0.01em;
    transition: color 0.2s;
    cursor: pointer;
    outline: none;
    border-bottom: 1px solid transparent;
    transition: all 0.2s;
  }
  .email-link:hover, .email-link:focus {
    color: var(--text-main);
    border-bottom-color: rgba(255,255,255,0.2);
  }

  .divider { margin: 20px 0; }

  /* Social icons */
  .socials {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .social-btn {
    display: flex; align-items: center; justify-content: center;
    width: 38px; height: 38px;
    border-radius: 10px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.09);
    text-decoration: none;
    color: var(--text-muted);
    transition: all 0.25s ease;
  }
  .social-btn:hover {
    background: rgba(255,255,255,0.1);
    border-color: rgba(255,255,255,0.2);
    color: #fff;
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
  }

  /* ── Work grid panel ── */
  #work {
    flex: 1;
    max-width: 740px;
    height: calc(100vh - 64px);
    max-height: 640px;
    padding: 28px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    overflow: hidden;
  }

  .work-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .work-title {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
  }
  .work-count {
    font-size: 11px;
    color: var(--text-dim);
    font-weight: 300;
  }

  /* Grid */
  .work-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(2, 1fr);
    gap: 12px;
    flex: 1;
    overflow: hidden;
  }

  .work-item {
    border-radius: 14px;
    overflow: hidden;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.07);
    position: relative;
    cursor: pointer;
    transition: all 0.3s ease;
    display: flex; align-items: center; justify-content: center;
    min-height: 0;
  }
  .work-item:hover {
    border-color: rgba(255,255,255,0.2);
    box-shadow: 0 12px 32px rgba(0,0,0,0.4);
    transform: translateY(-2px) scale(1.01);
  }
  .work-item img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.4s ease;
  }
  .work-item:hover img { transform: scale(1.04); }

  .work-item input[type="file"] { display: none; }

  .work-placeholder {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 8px;
    width: 100%; height: 100%;
    color: var(--text-dim);
    transition: color 0.2s;
  }
  .work-item:hover .work-placeholder { color: var(--text-muted); }
  .work-placeholder svg { opacity: 0.5; }
  .work-placeholder span {
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  /* Overlay on hover when image exists */
  .work-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(180deg, transparent 40%, rgba(0,0,0,0.7) 100%);
    opacity: 0;
    transition: opacity 0.3s;
    display: flex;
    align-items: flex-end;
    padding: 14px;
  }
  .work-item:hover .work-overlay { opacity: 1; }
  .work-caption {
    font-size: 11px;
    color: rgba(255,255,255,0.7);
    font-weight: 300;
    letter-spacing: 0.03em;
    outline: none;
    border-bottom: 1px solid transparent;
    transition: border-color 0.2s;
    min-width: 10px;
  }
  .work-caption:focus { border-bottom-color: rgba(255,255,255,0.3); color: #fff; }

  /* Remove image btn */
  .remove-btn {
    position: absolute;
    top: 8px; right: 8px;
    width: 24px; height: 24px;
    border-radius: 50%;
    background: rgba(0,0,0,0.6);
    border: 1px solid rgba(255,255,255,0.15);
    color: #fff;
    font-size: 12px;
    cursor: pointer;
    display: none;
    align-items: center; justify-content: center;
    z-index: 5;
    transition: background 0.2s;
  }
  .work-item:hover .remove-btn { display: flex; }
  .remove-btn:hover { background: rgba(200,50,50,0.6); }

  /* ── Responsive ── */
  @media (max-width: 900px) {
    #layout { flex-direction: column; overflow-y: auto; padding: 20px; align-items: stretch; }
    html, body { overflow: auto; }
    #work { max-height: none; height: auto; }
    .work-grid { grid-template-rows: auto; }
    .work-item { min-height: 100px; }
  }

  @media (max-width: 600px) {
    #card { width: 100%; }
    .work-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

const config = { paused: false, activePaletteIndex: 0, currentFormation: 0, numFormations: 3, densityFactor: 0.7 };
const colorPalettes = [
  [new THREE.Color(0x667eea),new THREE.Color(0x764ba2),new THREE.Color(0xf093fb),new THREE.Color(0x9d50bb),new THREE.Color(0x6e48aa)],
  [new THREE.Color(0xf857a6),new THREE.Color(0xff5858),new THREE.Color(0xfeca57),new THREE.Color(0xff6348),new THREE.Color(0xff9068)],
  [new THREE.Color(0x4facfe),new THREE.Color(0x00f2fe),new THREE.Color(0x43e97b),new THREE.Color(0x38f9d7),new THREE.Color(0x4484ce)]
];

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x000000, 0.002);
const camera = new THREE.PerspectiveCamera(65, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0, 8, 28);
const canvas = document.getElementById('bg-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, powerPreference: 'high-performance' });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setClearColor(0x000000);
renderer.outputColorSpace = THREE.SRGBColorSpace;

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true; controls.dampingFactor = 0.05;
controls.enableZoom = false; controls.enablePan = false;
controls.autoRotate = true; controls.autoRotateSpeed = 0.4;
controls.minPolarAngle = Math.PI*0.3; controls.maxPolarAngle = Math.PI*0.7;

const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloomPass = new UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight), 0.6, 0.5, 0.7);
composer.addPass(bloomPass);
composer.addPass(new OutputPass());

function createStarfield() {
  const count = 6000, pos=[], col=[], sz=[];
  for(let i=0;i<count;i++){
    const r=THREE.MathUtils.randFloat(50,150),phi=Math.acos(THREE.MathUtils.randFloatSpread(2)),theta=Math.random()*Math.PI*2;
    pos.push(r*Math.sin(phi)*Math.cos(theta),r*Math.sin(phi)*Math.sin(theta),r*Math.cos(phi));
    const c=Math.random();
    if(c<0.7) col.push(1,1,1); else if(c<0.85) col.push(0.7,0.8,1); else col.push(1,0.9,0.8);
    sz.push(THREE.MathUtils.randFloat(0.1,0.3));
  }
  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));
  geo.setAttribute('color',new THREE.Float32BufferAttribute(col,3));
  geo.setAttribute('size',new THREE.Float32BufferAttribute(sz,1));
  const mat=new THREE.ShaderMaterial({
    uniforms:{uTime:{value:0}},
    vertexShader:`attribute float size;attribute vec3 color;varying vec3 vColor;uniform float uTime;
    void main(){vColor=color;vec4 mv=modelViewMatrix*vec4(position,1.0);
    float t=sin(uTime*2.0+position.x*100.0)*0.3+0.7;
    gl_PointSize=size*t*(300.0/-mv.z);gl_Position=projectionMatrix*mv;}`,
    fragmentShader:`varying vec3 vColor;void main(){vec2 c=gl_PointCoord-0.5;float d=length(c);
    if(d>0.5)discard;float a=1.0-smoothstep(0.0,0.5,d);gl_FragColor=vec4(vColor,a*0.8);}`,
    transparent:true,depthWrite:false,blending:THREE.AdditiveBlending
  });
  return new THREE.Points(geo,mat);
}
const starField = createStarfield(); scene.add(starField);

class NeuralNetwork {
  constructor(nodeCount, connectionDensity) {
    this.nodes=[]; this.nodeCount=nodeCount; this.connectionDensity=connectionDensity; this.generate();
  }
  generate() {
    const LEVELS=6,nodesPerLevel=Math.ceil(this.nodeCount/LEVELS);
    this.nodes=[];
    for(let l=0;l<LEVELS;l++){
      const n=l===0||l===LEVELS-1?Math.ceil(nodesPerLevel*0.4):nodesPerLevel;
      for(let i=0;i<n;i++){
        const t=n>1?i/(n-1):0.5;
        const spread=10*(1-Math.abs(l-LEVELS/2)*0.1);
        this.nodes.push({
          position:new THREE.Vector3(
            THREE.MathUtils.lerp(-spread,spread,t)+THREE.MathUtils.randFloatSpread(2),
            THREE.MathUtils.lerp(-8,8,l/(LEVELS-1))+THREE.MathUtils.randFloatSpread(1.5),
            THREE.MathUtils.randFloatSpread(8)
          ),connections:[],level:l
        });
      }
    }
    const byLevel=Array.from({length:LEVELS},(_,l)=>this.nodes.filter(n=>n.level===l));
    for(let l=0;l<LEVELS-1;l++){
      byLevel[l].forEach(node=>{
        const targets=byLevel[l+1].filter(()=>Math.random()<this.connectionDensity);
        targets.forEach(t=>{ node.connections.push({node:t,strength:Math.random()}); });
        if(!node.connections.length&&byLevel[l+1].length){
          const t=byLevel[l+1][Math.floor(Math.random()*byLevel[l+1].length)];
          node.connections.push({node:t,strength:0.8});
        }
      });
    }
  }
}

const formations = [
  { nodeCount:120, connectionDensity:0.25 },
  { nodeCount:80,  connectionDensity:0.4  },
  { nodeCount:160, connectionDensity:0.15 }
];

let nodesMesh, connectionsMesh, neuralNetwork;

const pulseUniforms = {
  uTime:{value:0},
  uPulsePositions:{value:[new THREE.Vector3(),new THREE.Vector3(),new THREE.Vector3()]},
  uPulseTimes:{value:[-100,-100,-100]},
  uPulseColors:{value:[new THREE.Color(0x667eea),new THREE.Color(0xa5b4fc),new THREE.Color(0x764ba2)]}
};

const nodeShader = {
  vertexShader:`
    attribute vec3 nodeColor; attribute float nodeSize; attribute float nodePhase;
    varying vec3 vColor; uniform float uTime; uniform vec3 uPulsePositions[3];
    uniform float uPulseTimes[3]; uniform vec3 uPulseColors[3];
    void main(){
      vColor = nodeColor;
      float pulse=0.0;
      for(int i=0;i<3;i++){
        float t=uTime-uPulseTimes[i]; if(t<0.0||t>4.0) continue;
        float d=distance(position,uPulsePositions[i]);
        float r=t*8.0; float w=1.5;
        float ring=exp(-pow((d-r)/w,2.0));
        pulse+=ring*(1.0-t/4.0)*1.5;
        vColor=mix(vColor,uPulseColors[i],ring*0.6);
      }
      float wave=sin(uTime*2.0+nodePhase)*0.15+0.85;
      float sz=nodeSize*wave*(1.0+pulse*0.5);
      vec4 mv=modelViewMatrix*vec4(position,1.0);
      gl_PointSize=sz*(400.0/-mv.z);
      gl_Position=projectionMatrix*mv;
    }`,
  fragmentShader:`
    varying vec3 vColor;
    void main(){
      vec2 c=gl_PointCoord-0.5; float d=length(c); if(d>0.5) discard;
      float a=1.0-smoothstep(0.3,0.5,d);
      float core=1.0-smoothstep(0.0,0.2,d);
      gl_FragColor=vec4(vColor,a*0.9+core*0.1);
    }`
};

const connectionShader = {
  vertexShader:`
    attribute vec3 connectionColor; attribute float connectionStrength;
    attribute vec3 startPoint; attribute vec3 endPoint; attribute float pathIndex;
    varying vec3 vColor; varying float vStrength; varying float vPathPos;
    uniform float uTime; uniform vec3 uPulsePositions[3]; uniform float uPulseTimes[3]; uniform vec3 uPulseColors[3];
    void main(){
      vColor=connectionColor; vStrength=connectionStrength;
      vPathPos=fract(pathIndex/20.0);
      float pulse=0.0; vec3 col=connectionColor;
      for(int i=0;i<3;i++){
        float t=uTime-uPulseTimes[i]; if(t<0.0||t>4.0) continue;
        float d=distance(position,uPulsePositions[i]);
        float r=t*8.0; float w=2.0;
        float ring=exp(-pow((d-r)/w,2.0));
        pulse+=ring*(1.0-t/4.0);
        col=mix(col,uPulseColors[i],ring*0.7);
      }
      vColor=col;
      float flow=sin(uTime*1.5-vPathPos*6.28*3.0)*0.5+0.5;
      vStrength=connectionStrength*(0.4+flow*0.6+pulse);
      gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);
    }`,
  fragmentShader:`
    varying vec3 vColor; varying float vStrength;
    void main(){ gl_FragColor=vec4(vColor,vStrength*0.6); }`
};

function createNetworkVisualization(formIdx, density) {
  if(nodesMesh){ scene.remove(nodesMesh); nodesMesh.geometry.dispose(); nodesMesh.material.dispose(); }
  if(connectionsMesh){ scene.remove(connectionsMesh); connectionsMesh.geometry.dispose(); connectionsMesh.material.dispose(); }
  const f=formations[formIdx];
  neuralNetwork=new NeuralNetwork(Math.ceil(f.nodeCount*density),f.connectionDensity);
  const palette=colorPalettes[config.activePaletteIndex];
  const nodePositions=[],nodeColors=[],nodeSizes=[],nodePhases=[];
  neuralNetwork.nodes.forEach(n=>{
    nodePositions.push(n.position.x,n.position.y,n.position.z);
    const c=palette[Math.min(n.level,palette.length-1)].clone();
    c.offsetHSL(THREE.MathUtils.randFloatSpread(0.03),THREE.MathUtils.randFloatSpread(0.08),THREE.MathUtils.randFloatSpread(0.08));
    nodeColors.push(c.r,c.g,c.b);
    nodeSizes.push(THREE.MathUtils.randFloat(0.3,1.0));
    nodePhases.push(Math.random()*Math.PI*2);
  });
  const nodesGeo=new THREE.BufferGeometry();
  nodesGeo.setAttribute('position',new THREE.Float32BufferAttribute(nodePositions,3));
  nodesGeo.setAttribute('nodeColor',new THREE.Float32BufferAttribute(nodeColors,3));
  nodesGeo.setAttribute('nodeSize',new THREE.Float32BufferAttribute(nodeSizes,1));
  nodesGeo.setAttribute('nodePhase',new THREE.Float32BufferAttribute(nodePhases,1));
  const nodesMat=new THREE.ShaderMaterial({uniforms:THREE.UniformsUtils.clone(pulseUniforms),...nodeShader,transparent:true,depthWrite:false,blending:THREE.AdditiveBlending});
  nodesMesh=new THREE.Points(nodesGeo,nodesMat); scene.add(nodesMesh);

  const conPos=[],starts=[],ends=[],strengths=[],conColors=[],pathIdxs=[];
  const done=new Set();
  neuralNetwork.nodes.forEach((node,ni)=>{
    node.connections.forEach(conn=>{
      const ci=neuralNetwork.nodes.indexOf(conn.node);
      if(ci===-1) return;
      const key=[Math.min(ni,ci),Math.max(ni,ci)].join('-');
      if(done.has(key)) return; done.add(key);
      const segs=20;
      for(let s=0;s<segs;s++){
        const t=s/segs,t2=(s+1)/segs;
        const p1=new THREE.Vector3().lerpVectors(node.position,conn.node.position,t);
        const p2=new THREE.Vector3().lerpVectors(node.position,conn.node.position,t2);
        const mid=new THREE.Vector3().lerpVectors(node.position,conn.node.position,0.5);
        mid.z+=Math.sin(Math.PI*t)*2;
        const b1=new THREE.Vector3().lerpVectors(new THREE.Vector3().lerpVectors(node.position,mid,t),new THREE.Vector3().lerpVectors(mid,conn.node.position,t),t);
        const b2=new THREE.Vector3().lerpVectors(new THREE.Vector3().lerpVectors(node.position,mid,t2),new THREE.Vector3().lerpVectors(mid,conn.node.position,t2),t2);
        b1.add(new THREE.Vector3(THREE.MathUtils.randFloatSpread(0.08),THREE.MathUtils.randFloatSpread(0.08),THREE.MathUtils.randFloatSpread(0.08)));
        b2.add(new THREE.Vector3(THREE.MathUtils.randFloatSpread(0.08),THREE.MathUtils.randFloatSpread(0.08),THREE.MathUtils.randFloatSpread(0.08)));
        conPos.push(b1.x,b1.y,b1.z,b2.x,b2.y,b2.z);
        starts.push(node.position.x,node.position.y,node.position.z,node.position.x,node.position.y,node.position.z);
        ends.push(conn.node.position.x,conn.node.position.y,conn.node.position.z,conn.node.position.x,conn.node.position.y,conn.node.position.z);
        strengths.push(conn.strength,conn.strength);
        const lvl=Math.min(Math.floor((node.level+conn.node.level)/2),palette.length-1);
        const bc=palette[lvl%palette.length].clone();
        bc.offsetHSL(THREE.MathUtils.randFloatSpread(0.03),THREE.MathUtils.randFloatSpread(0.08),THREE.MathUtils.randFloatSpread(0.08));
        conColors.push(bc.r,bc.g,bc.b,bc.r,bc.g,bc.b);
        pathIdxs.push(s,s+1);
      }
    });
  });
  const conGeo=new THREE.BufferGeometry();
  conGeo.setAttribute('position',new THREE.Float32BufferAttribute(conPos,3));
  conGeo.setAttribute('startPoint',new THREE.Float32BufferAttribute(starts,3));
  conGeo.setAttribute('endPoint',new THREE.Float32BufferAttribute(ends,3));
  conGeo.setAttribute('connectionStrength',new THREE.Float32BufferAttribute(strengths,1));
  conGeo.setAttribute('connectionColor',new THREE.Float32BufferAttribute(conColors,3));
  conGeo.setAttribute('pathIndex',new THREE.Float32BufferAttribute(pathIdxs,1));
  const conMat=new THREE.ShaderMaterial({uniforms:THREE.UniformsUtils.clone(pulseUniforms),...connectionShader,transparent:true,depthWrite:false,blending:THREE.AdditiveBlending});
  connectionsMesh=new THREE.LineSegments(conGeo,conMat); scene.add(connectionsMesh);
  palette.forEach((c,i)=>{ if(i<3){ conMat.uniforms.uPulseColors.value[i].copy(c); nodesMat.uniforms.uPulseColors.value[i].copy(c); } });
}

let lastPulse=0;
const raycaster=new THREE.Raycaster(),pointer=new THREE.Vector2();
const iPlane=new THREE.Plane(new THREE.Vector3(0,0,1),0),iPoint=new THREE.Vector3();
function triggerPulse(cx,cy){
  pointer.x=(cx/innerWidth)*2-1; pointer.y=-(cy/innerHeight)*2+1;
  raycaster.setFromCamera(pointer,camera);
  iPlane.normal.copy(camera.position).normalize();
  iPlane.constant=-iPlane.normal.dot(camera.position)+camera.position.length()*0.5;
  if(raycaster.ray.intersectPlane(iPlane,iPoint)){
    const t=clock.getElapsedTime();
    lastPulse=(lastPulse+1)%3;
    if(nodesMesh&&connectionsMesh){
      nodesMesh.material.uniforms.uPulsePositions.value[lastPulse].copy(iPoint);
      nodesMesh.material.uniforms.uPulseTimes.value[lastPulse]=t;
      connectionsMesh.material.uniforms.uPulsePositions.value[lastPulse].copy(iPoint);
      connectionsMesh.material.uniforms.uPulseTimes.value[lastPulse]=t;
      const pal=colorPalettes[config.activePaletteIndex];
      const rc=pal[Math.floor(Math.random()*pal.length)];
      nodesMesh.material.uniforms.uPulseColors.value[lastPulse].copy(rc);
      connectionsMesh.material.uniforms.uPulseColors.value[lastPulse].copy(rc);
    }
  }
}

renderer.domElement.addEventListener('click', e=>{
  if(e.target.closest('#layout')) return;
  triggerPulse(e.clientX,e.clientY);
});

const clock=new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const t=clock.getElapsedTime();
  if(nodesMesh){ nodesMesh.material.uniforms.uTime.value=t; nodesMesh.rotation.y=Math.sin(t*0.04)*0.05; }
  if(connectionsMesh){ connectionsMesh.material.uniforms.uTime.value=t; connectionsMesh.rotation.y=Math.sin(t*0.04)*0.05; }
  starField.rotation.y+=0.0002; starField.material.uniforms.uTime.value=t;
  controls.update(); composer.render();
}

window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight); composer.setSize(innerWidth,innerHeight);
  bloomPass.resolution.set(innerWidth,innerHeight);
});

createNetworkVisualization(0, config.densityFactor);
animate();

// Auto-morph every 12s
let morphIdx=1;
setInterval(()=>{
  morphIdx=(morphIdx+1)%3;
  createNetworkVisualization(morphIdx, config.densityFactor);
}, 12000);
</script>

<script>
// ── Status ──
function updateStatus(val) {
  const dot = document.getElementById('status-dot');
  dot.className = 'status-dot ' + val;
}

// ── Avatar upload ──
document.getElementById('avatar-input').addEventListener('change', e => {
  const file = e.target.files[0]; if(!file) return;
  const url = URL.createObjectURL(file);
  const img = document.getElementById('avatar-img');
  img.src = url; img.style.display = 'block';
  document.querySelector('.avatar-placeholder').style.display = 'none';
});

// ── Social link editing ──
// Right-click any social icon to edit its URL
['github-link','behance-link','linkedin-link'].forEach(id => {
  const el = document.getElementById(id);
  el.addEventListener('contextmenu', e => {
    e.preventDefault();
    const url = prompt(`Update ${id.replace('-link','')} URL:`, el.href);
    if(url !== null) el.href = url || '#';
  });
  el.title = el.title + ' (right-click to edit URL)';
});

// Email link click opens mailto
document.querySelector('.email-link').addEventListener('click', function(e) {
  if(this.isContentEditable && document.activeElement === this) return;
  window.location.href = 'mailto:' + this.textContent.trim();
});

// ── Work Grid ──
const SLOTS = 6;
const grid = document.getElementById('work-grid');
const images = new Array(SLOTS).fill(null);
const captions = new Array(SLOTS).fill('');

function renderGrid() {
  grid.innerHTML = '';
  let filled = images.filter(Boolean).length;
  document.getElementById('work-count').textContent = `${filled} / ${SLOTS}`;

  for(let i=0; i<SLOTS; i++) {
    const item = document.createElement('div');
    item.className = 'work-item';

    if(images[i]) {
      const img = document.createElement('img');
      img.src = images[i];
      item.appendChild(img);

      const overlay = document.createElement('div');
      overlay.className = 'work-overlay';
      const cap = document.createElement('span');
      cap.className = 'work-caption';
      cap.contentEditable = 'true';
      cap.spellcheck = false;
      cap.dataset.placeholder = 'Add caption…';
      cap.textContent = captions[i] || '';
      cap.addEventListener('input', () => { captions[i] = cap.textContent; });
      cap.addEventListener('click', e => e.stopPropagation());
      overlay.appendChild(cap);
      item.appendChild(overlay);

      const rmBtn = document.createElement('button');
      rmBtn.className = 'remove-btn';
      rmBtn.innerHTML = '×';
      rmBtn.title = 'Remove image';
      rmBtn.addEventListener('click', e => { e.stopPropagation(); images[i]=null; captions[i]=''; renderGrid(); });
      item.appendChild(rmBtn);

    } else {
      const ph = document.createElement('div');
      ph.className = 'work-placeholder';
      ph.innerHTML = `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
        <rect x="3" y="3" width="18" height="18" rx="3"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <path d="m21 15-5-5L5 21"/>
      </svg><span>Add Image</span>`;
      item.appendChild(ph);

      const input = document.createElement('input');
      input.type = 'file'; input.accept = 'image/*';
      input.addEventListener('change', e => {
        const file = e.target.files[0]; if(!file) return;
        const reader = new FileReader();
        reader.onload = ev => { images[i] = ev.target.result; renderGrid(); };
        reader.readAsDataURL(file);
      });
      item.appendChild(input);
      item.addEventListener('click', () => input.click());
    }

    grid.appendChild(item);
  }
}

renderGrid();
</script>
